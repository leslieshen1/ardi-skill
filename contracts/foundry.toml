[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 1000
via_ir = true
fs_permissions = [{access = "read-write", path = "./"}]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fuzz]
runs = 256

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
